<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<title>Weather Station</title>
</head>
<body>

<div class="atmosphere" aria-hidden="true">
    <span class="drift drift--one"></span>
    <span class="drift drift--two"></span>
    <span class="drift drift--three"></span>
</div>

<div class="container1">

    <p class="eyebrow">Local Weather Station</p>

    <div class="searchbox">
        <i class='bx bxs-map bx-burst'></i>
        <input type="text" placeholder="Enter your location">
        <button aria-label="Search location"><i class='bx bx-search'></i></button>
    </div>

    <div class="whether-box">
        <div class="box">
            <div class="gauge">
                <svg class="gauge__ticks" viewBox="0 0 240 240" aria-hidden="true">
                    <!-- 40 tick marks generated as a ring -->
                    <g stroke="currentColor">
                        <!-- ticks drawn via CSS ::before ring instead, kept as fallback circle -->
                    </g>
                    <circle cx="120" cy="120" r="112" fill="none" stroke-width="1" />
                </svg>
                <div class="gauge__ring"></div>
                <div class="gauge__face">
                    <div class="info-whether">
                        <div class="image-whether">
                            <img src="cloud.png" alt="Weather condition">
                            <p class="temperature">0<span>°C</span></p>
                            <p class="description">Broken cloud</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="whether-details">
        <div class="humaity">
            <span class="module-icon module-icon--cyan"><i class='bx bx-water'></i></span>
            <div class="text">
                <div class="info-humanity">
                    <span>0%</span>
                </div>
                <p>Humidity</p>
            </div>
        </div>

        <div class="wind">
            <span class="module-icon module-icon--amber"><i class='bx bx-wind'></i></span>
            <div class="text">
                <div class="info-wind">
                    <span>0km/h</span>
                </div>
                <p>Wind speed</p>
            </div>
        </div>
    </div>

</div>

<script src="main.js"></script>
</body>
</html>
